spring:
  application:
    name: invest-alert-api

  jackson:
    time-zone: ${TZ:America/Sao_Paulo}

  # MySQL Configuration (Req 8.1, 8.2)
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:investalert}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=${TZ:America/Sao_Paulo}&useUnicode=true&characterEncoding=UTF-8
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:changeme}
    hikari:
      minimum-idle: ${MYSQL_POOL_MIN_IDLE:5}
      maximum-pool-size: ${MYSQL_POOL_MAX_SIZE:20}
      idle-timeout: ${MYSQL_POOL_IDLE_TIMEOUT:30000}
      connection-timeout: ${MYSQL_POOL_CONNECTION_TIMEOUT:20000}

  sql:
    init:
      mode: always

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

# JWT Configuration (Req 8.3)
app:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-change-in-production}
    expiration-ms: ${JWT_EXPIRATION_MS:900000}
    refresh-token-expiration-seconds: ${JWT_REFRESH_EXPIRATION_SECONDS:3600}
  api:
    versions:
      v1:
        deprecated: false
