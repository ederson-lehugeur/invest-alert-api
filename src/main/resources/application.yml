spring:
  application:
    name: invest-alert-api

  # MySQL Configuration (Req 8.1, 8.2)
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:investmonitor}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:changeme}
    hikari:
      minimum-idle: ${MYSQL_POOL_MIN_IDLE:5}
      maximum-pool-size: ${MYSQL_POOL_MAX_SIZE:20}
      idle-timeout: ${MYSQL_POOL_IDLE_TIMEOUT:30000}
      connection-timeout: ${MYSQL_POOL_CONNECTION_TIMEOUT:20000}

  sql:
    init:
      mode: always

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # SMTP Configuration (Req 8.4)
  mail:
    host: ${SMTP_HOST:smtp.example.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:user@example.com}
    password: ${SMTP_PASSWORD:changeme}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # Quartz Configuration (Req 8.5)
  quartz:
    job-store-type: memory
    properties:
      org:
        quartz:
          scheduler:
            instanceName: InvestMonitorScheduler
          threadPool:
            threadCount: 3

# JWT Configuration (Req 8.3)
app:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-change-in-production}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

  # Quartz evaluation interval in milliseconds (Req 8.5)
  scheduler:
    evaluation-interval-ms: ${SCHEDULER_INTERVAL_MS:300000}
