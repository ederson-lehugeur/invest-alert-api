spring:
  datasource:
    url: jdbc:mysql://localhost:3307/investmonitor?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: investmonitor
    password: investmonitor
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: never

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  mail:
    host: localhost
    port: 1025
    username: ""
    password: ""
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

app:
  jwt:
    secret: dev-only-secret-key-do-not-use-in-production-1234567890
    expiration-ms: 86400000

  scheduler:
    evaluation-interval-ms: 60000
